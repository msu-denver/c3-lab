# Dependabot configuration.
#
# Tracks two ecosystems:
#
#   * github-actions — bumps SHA-pinned action references in .github/workflows
#     when new tagged versions ship. Critical for keeping the Claude review
#     workflows, the Jekyll CI workflow, and any future actions current with
#     upstream security fixes.
#
#   * bundler — bumps the Ruby dependencies declared in Gemfile (Jekyll, the
#     theme, the plugin set). Weekly cadence to keep the noise low; security
#     updates land out-of-band via the repo-level "Dependabot security
#     updates" setting.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ruby"
