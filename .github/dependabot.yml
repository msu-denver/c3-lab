# Dependabot configuration.
#
# Tracks two ecosystems:
#
#   * github-actions — bumps SHA-pinned action references in .github/workflows
#     when new tagged versions ship. Critical for keeping the Claude review
#     workflows, the Jekyll CI workflow, and any future actions current with
#     upstream security fixes. Grouped into a single PR per run to reduce noise.
#
#   * bundler — bumps the Ruby dependencies declared in Gemfile (Jekyll, the
#     theme, the plugin set). Weekly cadence to keep the noise low; minor and
#     patch bumps are grouped into one PR. Security updates land out-of-band
#     via the repo-level "Dependabot security updates" setting.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"
