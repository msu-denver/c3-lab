# Interactive @claude bot — responds to `@claude` mentions in issues, PR
# comments, PR review comments, and PR reviews.
#
# Public-repo safety: this workflow is the highest-risk of the Claude
# workflows because the trigger surface is broad (anyone can comment on an
# issue or PR) and the bot has `contents: write` so it can make code changes.
# Two layers contain it:
#
#   * Author-association gate. The job's `if:` requires the comment / issue /
#     review author to have at least COLLABORATOR access on the repository.
#     Random outside users CANNOT trigger this workflow even if their text
#     contains @claude. CONTRIBUTOR (anyone with a merged PR) is deliberately
#     excluded — write access is the bar, not historical contribution.
#
#   * SHA-pinned action. No version drift can silently expand the bot's
#     behaviour.
#
# Permissions include `contents: write` so the bot can commit code changes in
# response to a maintainer's @claude request — this is the intentional power
# of the bot, and the author-association gate above is what makes granting
# that scope acceptable on a public repository.
#
# The CLAUDE_CODE_OAUTH_TOKEN repository secret must be provisioned by a
# maintainer (see SECURITY.md).

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      ((github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
       (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
       (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
       (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # SHA-pinned actions/checkout v4.2.2
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      # SHA-pinned anthropics/claude-code-action v1.0.133.
      - name: Run Claude Code
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          include_fix_links: true
          track_progress: true
          additional_permissions: |
            actions: read
