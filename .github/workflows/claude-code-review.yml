# Automated Claude code review on every pull request, with a free Semgrep SAST
# pass that runs first and feeds its findings into the review.
#
# This workflow uses the OAuth-bound CLAUDE_CODE_OAUTH_TOKEN (provisioned by
# `claude /install-github-app` from a local Claude Code session) rather than a
# metered API key, so the review draws against a Claude subscription rather
# than billing per-run.
#
# Why this workflow is safe on a PUBLIC repository:
#
#   * Trigger is `pull_request`, NOT `pull_request_target`. `pull_request_target`
#     runs in the base repository's context and exposes secrets to code from
#     an untrusted fork PR (a credential-exfiltration risk). `pull_request`
#     runs the workflow definition from the BASE branch and does not expose
#     secrets to fork code by default.
#
#   * "Require approval for all outside collaborators" is enabled in the
#     repository's Actions settings. A first-time outside contributor's first
#     workflow run must be approved by a maintainer before any Action executes,
#     which bounds drive-by subscription-quota burn from random PRs.
#
#   * Permissions are scoped to what each job needs; no broader scope is
#     granted.
#
#   * Every action is pinned to a full commit SHA with a version comment, and
#     the repository enforces "Require actions to be pinned to a full-length
#     commit SHA". The plugin marketplace below is anthropics' own repository,
#     so the trust posture is the same as trusting the action itself.
#
# The CLAUDE_CODE_OAUTH_TOKEN repository secret must be provisioned by a
# maintainer (see SECURITY.md).

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  # Manual re-run path. The Anthropic API server-side throttle ("Server is
  # temporarily limiting requests · not your usage limit") is transient and
  # has failed a review run mid-flight; this lets a maintainer re-review a
  # specific PR on demand without pushing an empty commit. `pr_number` is
  # required so the checkout and the review prompt both target that PR (a
  # bare workflow_dispatch has no pull_request context).
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (manual re-run after a transient failure)'
        required: true
        type: string

jobs:
  # Free, token-free SAST (Semgrep OSS). Runs first and posts a single sticky
  # findings comment so the Claude review job (which reads PR comments) folds
  # the results into its review. Replaces the metered claude-security-review.yml.
  # Runs on dependabot too: the committed-secret / CI-misconfig signal is
  # exactly what we want on a dependency-bump PR. The comment-post step is
  # `continue-on-error` so the read-only dependabot token does not surface the
  # run as failed.
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # SHA-pinned actions/checkout v4.2.2 (matches ci.yml).
      - name: Check out the repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      # The repository enforces "Require actions to be pinned to a full-length
      # commit SHA", which rejects actions/setup-python. pipx is preinstalled on
      # the runner and needs no action, so install the pinned Semgrep through it.
      - name: Install Semgrep (OSS, pinned, no token)
        run: pipx install semgrep==1.165.0

      - name: Run Semgrep
        # This is a static Jekyll site (Markdown / Liquid / SCSS / config), so
        # the source-code packs (p/python, p/bash, p/javascript) find nothing
        # of value here and are deliberately omitted. We keep only the two packs
        # that DO apply to a public site with CI: committed-secret detection and
        # CI/workflow misconfiguration. `|| true` keeps the job green so findings
        # are advisory (the Claude review and a human decide).
        run: |
          semgrep scan --json --output semgrep.json \
            --config p/secrets \
            --config p/ci || true

      - name: Post Semgrep findings as a sticky PR comment
        # Dependabot PRs run with a read-only token, so the comment post fails
        # there. continue-on-error keeps the job (and the run) green, so the
        # review workflow does not surface as a failed/skipped run on dependabot.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MARKER: '### Semgrep (OSS)'
        run: |
          COUNT=$(jq '.results | length' semgrep.json)
          if [ "$COUNT" -eq 0 ]; then
            printf '%s: no findings\n\n_Clean scan. Posted before the Claude review._\n' "$MARKER" > semgrep-comment.md
          else
            HIGH=$(jq '[.results[]|select(.extra.severity=="ERROR")]|length' semgrep.json)
            MED=$(jq '[.results[]|select(.extra.severity=="WARNING")]|length' semgrep.json)
            LOW=$(jq '[.results[]|select(.extra.severity=="INFO")]|length' semgrep.json)
            {
              printf '%s: %s findings\n\n' "$MARKER" "$COUNT"
              printf '<details><summary>HIGH (%s) · MEDIUM (%s) · LOW (%s)</summary>\n\n' "$HIGH" "$MED" "$LOW"
              printf '| Sev | Rule | Location | Message |\n|---|---|---|---|\n'
              jq -r '.results[] | "| \(.extra.severity|if .=="ERROR" then "HIGH" elif .=="WARNING" then "MEDIUM" else "LOW" end) | \(.check_id|split(".")|last) | \(.path):\(.start.line) | \(.extra.message|gsub("[\n|]";" ")|.[0:120]) |"' semgrep.json
              printf '\n</details>\n\n_Posted before the Claude review so findings are folded into the review._\n'
            } > semgrep-comment.md
          fi
          # Sticky: delete any prior Semgrep comment so the thread keeps one.
          gh api "repos/$REPO/issues/$PR/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
          | while read -r id; do
              gh api -X DELETE "repos/$REPO/issues/comments/$id" || true
            done
          gh pr comment "$PR" --body-file semgrep-comment.md

  # Wait for the "CI" workflow (ci.yml) to finish on this PR's head commit, then
  # post its result as a sticky comment. The Claude review `needs:` this job (so
  # it runs only after the build completes) and reads PR comments, so it folds
  # the Jekyll build outcome into its review, the same sticky-comment hand-off
  # the semgrep job uses. The review action only supports pull_request
  # context (not workflow_run), so the gating is done in-workflow. This job adds
  # no `uses:` step: the repository enforces "Require actions to be pinned to a
  # full-length commit SHA", and gh is preinstalled on the runner, so polling and
  # commenting need no action at all.
  await-tests:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Wait for CI tests and post the result as a sticky comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          MARKER: '### CI Build'
        run: |
          # Poll the CI workflow run for this head commit (~30 min ceiling). The
          # &event=pull_request filter selects the PR-context run, not the push
          # run ci.yml also fires on the same commit, so the conclusion reflects
          # the same checks a reviewer sees on the PR.
          status="missing"; conclusion=""; runid=""
          for i in $(seq 1 60); do
            run=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&event=pull_request&per_page=1" 2>/dev/null || echo '{}')
            status=$(echo "$run" | jq -r '.workflow_runs[0].status // "missing"')
            if [ "$status" = "completed" ]; then
              conclusion=$(echo "$run" | jq -r '.workflow_runs[0].conclusion')
              runid=$(echo "$run" | jq -r '.workflow_runs[0].id')
              break
            fi
            sleep 30
          done
          {
            printf '%s\n\n' "$MARKER"
            if [ "$conclusion" = "success" ]; then
              printf '✅ **Build passed**: the Jekyll site build (ci.yml) is green on `%s`.\n' "${SHA:0:9}"
            elif [ "$conclusion" = "failure" ]; then
              printf '❌ **Build failed** on `%s`. Failing output (truncated):\n\n```\n' "${SHA:0:9}"
              gh run view "$runid" --repo "$REPO" --log-failed 2>/dev/null \
                | grep -iE 'error|exception|liquid|fatal|failed|conversion' \
                | head -40 || true
              printf '```\n'
            else
              printf '⚠️ The build did not complete within the wait window (last status: %s). The review proceeds without a final build result; confirm the CI check before merge.\n' "${conclusion:-$status}"
            fi
            printf '\n_Posted before the Claude review so the test outcome is folded into the review._\n'
          } > ci-tests-comment.md
          # Sticky: replace any prior CI Tests comment so the thread keeps one.
          gh api "repos/$REPO/issues/$PR/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
          | while read -r id; do
              gh api -X DELETE "repos/$REPO/issues/comments/$id" || true
            done
          # --repo is required: this job has no checkout, so gh cannot infer the
          # repo from git context (unlike the semgrep job).
          gh pr comment "$PR" --repo "$REPO" --body-file ci-tests-comment.md

  claude-review:
    # Dependabot PRs get a read-only token and no Actions secrets, so the
    # OAuth-bound review action errors on them. Skip the review there; the
    # semgrep job above still runs and posts its findings.
    if: ${{ github.actor != 'dependabot[bot]' }}
    # Both gates post their sticky comments before the review runs:
    #   semgrep -> "Semgrep (OSS)"; await-tests -> "CI Tests".
    needs: [semgrep, await-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      actions: read
      id-token: write
    steps:
      # SHA-pinned actions/checkout v4.2.2
      - name: Check out the repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # On a pull_request event github.ref is refs/pull/<n>/merge (the
          # default checkout target). On a manual workflow_dispatch re-run we
          # point at the requested PR's head so the agent reads that PR's code.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', github.event.inputs.pr_number) || github.ref }}
          fetch-depth: 1

      # SHA-pinned anthropics/claude-code-action v1.0.133. Bump by re-resolving
      # the v1 tag's target commit:
      #   gh api repos/anthropics/claude-code-action/git/refs/tags/v1
      - name: Run Claude code review
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          include_fix_links: true
          track_progress: true
          allowed_bots: 'claude[bot]'
          claude_args: '--model opus'
          prompt: >-
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.inputs.pr_number }} --comment
            This PR's CI has already run. A "Semgrep (OSS)" comment and a "CI Build" comment
            (the Jekyll site build outcome, with any failing build output) are posted on the PR.
            Read both and factor them into your review. You do NOT have a runnable build
            environment here and cannot build the site yourself, so rely on the "CI Build"
            comment for the build result and do not tell the reader to "confirm CI is green".
            Always include a "Test coverage" section in your review (never omit it). This repo is a
            static Jekyll site (Markdown / Liquid templates / SCSS / config) with no automated
            unit-test suite, so:
            - If the "CI Build" comment shows a failure, call it out as a blocking finding and
            relate it to the diff where you can.
            - If this PR adds non-trivial logic (e.g. a custom Jekyll plugin, JS in assets, or
            intricate Liquid) that would warrant a test and there is no harness for it, say so and
            note the repo has no test harness today. Do NOT invent a HIGH finding for the absence
            of tests on ordinary content, template, or style changes.
            - For ordinary content / template / style / config / docs changes, state explicitly
            "No test changes needed: <reason>" rather than staying silent.
            SEVERITY BAR (label findings precisely — a separate `review-gate` check BLOCKS merge on
            a HIGH/CRITICAL finding, and a second pass reads YOUR review to decide the verdict, so
            your severity labels are load-bearing). Reserve HIGH/CRITICAL for: a correctness bug
            reachable on a common path; a security vulnerability (including a committed secret or a
            CI/workflow misconfiguration); content/template breakage that takes down a page; or a
            Jekyll build FAILURE on this PR. Do NOT label as HIGH/CRITICAL (these must not block):
            style, naming, copy/wording, missing tests, speculative or defensive hardening,
            symmetric-gap or "while you're here" polish, or anything you are not confident is a
            real, reachable defect. When in doubt it is MEDIUM.

  # ---------------------------------------------------------------------------
  # Verdict extractor (the gate's "second pass"). A cheap, single-purpose Claude
  # call whose ONLY job is to read the review just posted and emit a strict
  # machine verdict. Decoupling this from the main review is deliberate: a model
  # asked to emit one constrained line, with nothing else competing for its
  # output, does so far more reliably than a marker buried at the end of a long
  # review (which proved unreliable). It is an EXTRACTOR, not a second reviewer:
  # it reports the review's own HIGH/CRITICAL count, it does not re-judge the diff.
  #
  # Per-repo config: REVIEW_BOT is the login the review comment is posted under
  # (the installed GitHub App; `claude[bot]` for the official action).
  # ---------------------------------------------------------------------------
  verdict-extract:
    needs: [claude-review]
    # Only run when the review actually produced something to extract from.
    if: ${{ needs.claude-review.result == 'success' && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    env:
      REVIEW_BOT: 'claude[bot]'
    steps:
      # SHA-pinned actions/checkout v4.2.2 (the extractor reads ./REVIEW.md from
      # the workspace, so the action's agent needs a checkout to read it).
      - name: Check out the repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Fetch the review comment into ./REVIEW.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -euo pipefail
          # The latest comment authored by the review bot is the review. Pass it to
          # the extractor as a file (not inline in the prompt) to avoid prompt
          # injection from the review/PR text.
          gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "map(select(.user.login==\"$REVIEW_BOT\")) | last | .body // \"\"" > REVIEW.md
          if [ ! -s REVIEW.md ]; then
            echo "No review comment by $REVIEW_BOT found; extractor cannot run." >&2
            exit 1
          fi

      # SHA-pinned anthropics/claude-code-action v1.0.133 (same as the review).
      # Cheap model (Haiku) — this is a one-line classification, not a review.
      - name: Extract the merge verdict
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: '--model haiku'
          prompt: >-
            Read the file ./REVIEW.md in the repository — it is an automated code review of this
            pull request. Your ONLY task is to report its merge verdict. Count the findings the
            review itself rates HIGH or CRITICAL severity (a "CI Tests" FAILURE called out in the
            review also counts). Do NOT re-judge the diff, do NOT add findings of your own, and do
            NOT count MEDIUM/LOW findings, missing-test notes, or anything the review did not label
            HIGH/CRITICAL. Your published PR comment must be EXACTLY one line, nothing else:
            MERGE-VERDICT-GATE VERDICT=PASS COUNT=0
            (when the review has zero HIGH/CRITICAL findings), or
            MERGE-VERDICT-GATE VERDICT=BLOCK COUNT=N
            (where N is the number of HIGH/CRITICAL findings, N>=1).

  # ---------------------------------------------------------------------------
  # Merge gate. Reads the verdict extractor's line and FAILS this check when the
  # review reported a HIGH/CRITICAL finding, so the PR cannot merge until the
  # latest review is clean. Three outcomes:
  #
  #   PASS          - extractor emitted VERDICT=PASS (no HIGH/CRITICAL). Check green.
  #   BLOCK         - extractor emitted VERDICT=BLOCK (>=1). Check red. Push a fix
  #                   (the review + extractor re-run on each push and can clear it),
  #                   or a MAINTAINER applies the `review-ack` label to override.
  #   INCONCLUSIVE  - the review or the extractor did not complete (transient API
  #                   throttle) OR no parseable verdict was found. Check red, but
  #                   distinct and re-runnable: a flaky pass must NEVER read as PASS.
  #
  # The `review-ack` override is access-controlled and scoped: it counts only when
  # the label was applied by someone with write/maintain/admin permission AND at or
  # after the current head commit (a stale ack from a prior push cannot clear a new
  # finding). Admin-bypass on branch protection remains the emergency break-glass.
  #
  # ROLLOUT (per-repo): OBSERVE-ONLY until a maintainer adds the `review-gate`
  # check to the branch's required status checks. Create the label once:
  #   gh label create review-ack -c '0E8A16' \
  #     -d 'Maintainer override: merge despite a blocking Claude review finding'
  # ---------------------------------------------------------------------------
  review-gate:
    needs: [claude-review, verdict-extract]
    # always(): the gate must still run (and report INCONCLUSIVE) when the review
    # or extractor errored — `needs` would otherwise SKIP it, and a skipped
    # required check could be misread as non-blocking. Skip only for dependabot.
    if: ${{ always() && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      # issues: write so the gate can delete the raw verdict-extractor comment
      # (a PR conversation/issue comment authored by the review bot) after
      # parsing it, leaving only the human-readable gate verdict.
      issues: write
    steps:
      - name: Evaluate the verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_RESULT: ${{ needs.claude-review.result }}
          EXTRACT_RESULT: ${{ needs.verdict-extract.result }}
          REVIEW_BOT: 'claude[bot]'
          ACK_LABEL: review-ack
          MARKER: '### Review Gate'
        run: |
          set -euo pipefail
          verdict=""; count="0"; reason=""; gate="BLOCK"

          # 1) INCONCLUSIVE if the review or the extractor didn't complete.
          if [ "$REVIEW_RESULT" != "success" ]; then
            verdict="INCONCLUSIVE"
            reason="The Claude review did not complete (job result: \`${REVIEW_RESULT}\`). Usually a transient API throttle, not a code finding."
          elif [ "$EXTRACT_RESULT" != "success" ]; then
            verdict="INCONCLUSIVE"
            reason="The verdict extractor did not complete (job result: \`${EXTRACT_RESULT}\`)."
          else
            # 2) Parse the verdict from the extractor's comment (authored by the
            # review bot AND carrying the MERGE-VERDICT-GATE token — the review
            # comment itself never carries that token, so this isolates the
            # extractor without matching the gate's own comment or the docs).
            body=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
              --jq "map(select(.user.login==\"$REVIEW_BOT\" and (.body|contains(\"MERGE-VERDICT-GATE\")))) | last | .body // \"\"")
            line=$(printf '%s' "$body" | grep -oE 'MERGE-VERDICT-GATE VERDICT=(PASS|BLOCK) COUNT=[0-9]+' | tail -1 || true)
            if [ -z "$line" ]; then
              verdict="INCONCLUSIVE"
              reason="No parseable \`MERGE-VERDICT-GATE VERDICT=...\` line was found in the extractor comment."
            else
              verdict=$(printf '%s' "$line" | sed -E 's/.*VERDICT=([A-Z]+).*/\1/')
              count=$(printf '%s' "$line" | sed -E 's/.*COUNT=([0-9]+).*/\1/')
            fi
          fi

          # 3) review-ack override: maintainer-applied AND scoped to the current head.
          override="no"; ack_actor=""
          if gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null | grep -qx "$ACK_LABEL"; then
            ev=$(gh api "repos/$REPO/issues/$PR/events" --paginate \
              --jq "map(select(.event==\"labeled\" and .label.name==\"$ACK_LABEL\")) | last" 2>/dev/null || echo '{}')
            ack_actor=$(printf '%s' "$ev" | jq -r '.actor.login // ""')
            applied_at=$(printf '%s' "$ev" | jq -r '.created_at // ""')
            head_at=$(gh api "repos/$REPO/commits/$SHA" --jq '.commit.committer.date // ""' 2>/dev/null || echo "")
            perm=$(gh api "repos/$REPO/collaborators/$ack_actor/permission" --jq '.permission // "none"' 2>/dev/null || echo none)
            # Scoped: ack must be applied at/after the head commit (ISO-8601 sorts
            # lexically, so `sort -c` over head,applied succeeds iff applied >= head).
            scoped="no"
            if [ -n "$applied_at" ] && [ -n "$head_at" ] && \
               printf '%s\n%s\n' "$head_at" "$applied_at" | sort -c >/dev/null 2>&1; then
              scoped="yes"
            fi
            case "$perm" in admin|maintain|write) maint="yes" ;; *) maint="no" ;; esac
            if [ "$scoped" = "yes" ] && [ "$maint" = "yes" ]; then
              override="yes"
            fi
          fi

          # 4) Decide.
          if [ "$verdict" = "PASS" ]; then
            gate="PASS"; reason="Review reported no HIGH/CRITICAL findings."
          elif [ "$override" = "yes" ]; then
            gate="PASS"; reason="Overridden via \`${ACK_LABEL}\` (applied by maintainer @${ack_actor} at/after the current head commit). Original verdict: ${verdict}${count:+, ${count} blocking}."
          fi

          # 5) Post a sticky gate comment.
          {
            printf '%s\n\n' "$MARKER"
            case "$gate:$verdict" in
              PASS:PASS)        printf '✅ **Gate: PASS** — %s\n' "$reason" ;;
              PASS:*)           printf '✅ **Gate: PASS (override)** — %s\n' "$reason" ;;
              BLOCK:BLOCK)      printf '🛑 **Gate: BLOCK** — the review reported %s HIGH/CRITICAL finding(s). Address them and push (the review re-runs on each push), or a maintainer can apply the `%s` label to override.\n' "$count" "$ACK_LABEL" ;;
              *:INCONCLUSIVE)   printf '⚠️ **Gate: INCONCLUSIVE** — %s Re-run via Actions → Claude Code Review → Run workflow (with this PR number), or a maintainer can apply the `%s` label.\n' "$reason" "$ACK_LABEL" ;;
              *)                printf '🛑 **Gate: BLOCK** — %s\n' "$reason" ;;
            esac
            printf '\n_Observe-only until `review-gate` is added to the branch'"'"'s required status checks._\n'
          } > gate-comment.md
          gh api "repos/$REPO/issues/$PR/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" 2>/dev/null \
          | while read -r id; do gh api -X DELETE "repos/$REPO/issues/comments/$id" >/dev/null 2>&1 || true; done
          gh pr comment "$PR" --repo "$REPO" --body-file gate-comment.md || true

          # Tidy the thread: now that we've parsed it, remove the raw verdict-
          # extractor comment (the machine `MERGE-VERDICT-GATE VERDICT=...` line)
          # so a reader sees only this human-readable gate verdict at the bottom,
          # not the plumbing. Scoped to the review-bot author AND the marker, so
          # it never touches the review comment or anything else.
          gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.user.login==\"$REVIEW_BOT\" and (.body|contains(\"MERGE-VERDICT-GATE\"))) | .id" 2>/dev/null \
          | while read -r id; do gh api -X DELETE "repos/$REPO/issues/comments/$id" >/dev/null 2>&1 || true; done

          # 6) Set the check result.
          if [ "$gate" = "PASS" ]; then
            echo "review-gate: PASS — $reason"
          else
            echo "review-gate: ${verdict} — $reason"
            exit 1
          fi
